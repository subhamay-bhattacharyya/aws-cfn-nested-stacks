# This is a basic workflow to help you get started with Actions
name: Validate and upload CFN Templates to S3

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature**'
    paths-ignore:
      - '**/README.md'
      - '**/.github/workflows/**.yaml'
      - '**/CHANGELOG.md'
      - '**/LICENSE'
      - '**/VERSION'
      - '.gitignore'

permissions:
  id-token: write                       # This is required for aws oidc connection
  contents: read                        # This is required for actions/checkout
  pull-requests: write                  # This is required for gh bot to comment PR
  issues: write                         # This is required for gh bot to comment issues

jobs:
  setup-repository:
    name: Setup Repository
    outputs:
      issue-number: ${{ steps.get-repo-details.outputs.issue-number }}
    runs-on: ubuntu-latest
    steps:

      - name: Get Repository Details
        id: get-repo-details
        run: |
          if [ "${{ github.event.commits }}" != "null" ] && [ "${{ github.event.commits }}" != "[]" ]; then
            echo "commit message   = ${{ github.event.commits[0].message }}"
          else
            echo "No commits found in the event."
          fi
          if [ "${{ github.event.commits }}" != "null" ] && [ "${{ github.event.commits }}" != "[]" ]; then
            if [ -n "${{ github.event.commits[0].message }}" ]; then
              echo "issue-number=`echo ${{ github.event.commits[0].message }}|cut -d':' -f1|cut -d'-' -f2|tr -d '0'`" >> $GITHUB_OUTPUT
            else
              echo "issue-number=" >> $GITHUB_OUTPUT
            fi
          else
            echo "issue-number=" >> $GITHUB_OUTPUT
          fi

      - name: Get Issue
        id: get-branch-issue
        uses: octokit/request-action@v2.4.0
        with:
          route: GET /repos/{owner}/{repo}/issues/{issue_number}
          owner: ${{ github.repository_owner }}
          repo: ${{ github.event.repository.name }}
          issue_number: ${{ steps.get-repo-details.outputs.issue-number }}
          mediaType: format=raw
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print Repository Details
        id: print-repository-details
        if: always()
        run: |
          echo "GitHub event                 : ${{ github.event_name }}"
          echo "Issue Number                 : ${{ steps.get-repo-details.outputs.issue-number }}"
          echo "Issue Title                  : ${{ fromJSON(steps.get-branch-issue.outputs.data).title }}"
          echo "Issue Body                   : ${{ fromJSON(steps.get-branch-issue.outputs.data).body }}"
          echo "Issue Closed At              : ${{ fromJSON(steps.get-branch-issue.outputs.data).closed_at }}"

